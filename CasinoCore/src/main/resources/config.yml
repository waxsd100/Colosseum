# ============================================================
# CasinoCore 設定ファイル
# ============================================================

# チップの最大購入額（自動分割モード時, 0 = 無制限）
max-buy: 1000000

# ランキング表示件数（1〜100, 推奨: 10）
ranking-size: 10

# チップの最小購入額
min-buy: 100

# チップの換金手数料率 (0.0 〜 1.0, 推奨: 0.0〜0.05)
cashout-fee: 0.0

# デバッグログ出力 (true/false)
debug: false
