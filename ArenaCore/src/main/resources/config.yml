# ============================================================
# ArenaCore 設定ファイル
# ============================================================

# 勝利条件: last-team-standing / manual / score
win-condition: last-team-standing

# 戦闘員の参加費（0 = 無料, Vault経済から徴収）
entry-fee: 0

# スコア制の場合の勝利キル数（0 = /arena end で手動集計）
score-target: 0

# ベット受付中にオッズを定期表示する間隔（秒, 0 = 無効, 推奨: 15〜60）
odds-broadcast-interval: 30

# ── 天引き分配率（ベッタープールに対する %） ──
distribution:
  loser-fighter-share: 0.01     # 敗者闘技者への還元率 (1%)
  winner-fighter-share: 0.10    # 勝者闘技者への還元率 (10%)
  house-fee: 0.05               # 運営手数料 → ジャックポット積立 (5%)
  # 残り (84%) が観客配当

# ── ジャックポット ──
jackpot:
  enabled: true
  trigger-threshold: 0.10       # 勝利チームのベット比率がこれ未満で発動

# ── 闘技者の最低保証金（ノーマルマッチ） ──
fighter-guarantee: 100          # 勝敗に関係なく全闘技者に支払う固定給

# ── ブラインドフェーズ ──
blind:
  enabled: true                   # ベット終了前にオッズ非公開期間を設ける
  seconds-before-close: 30        # 締切何秒前にブラインドに移行するか

# ── デスマッチ ──
deathmatch:
  max-proposals: 2                # 1セッション中の最大DM提案回数
  house-fee-enabled: false        # DMプールにも運営手数料をかけるか

# ── ベットタイマー ──
default-betting-duration: 0       # /arena lock 時のデフォルトベット制限時間（秒, 0 = 無制限）

# ── 地形復元 ──
terrain-restore:
  # 地形復元を有効にするか (WorldEdit 必須)
  enabled: true
  # 試合中: ブロック破壊からN tick後に自動復元 (20tick=1秒)
  during-match-delay: 300
  # 試合後: 高速復元開始までの遅延 (tick)
  post-match-delay: 60
  # 試合後: 1tickあたりの復元ブロック数
  post-match-blocks-per-tick: 10
  # 復元エフェクト (パーティクル + 効果音, 試合中のみ)
  effects: true

# ── ダブルアップ（パーレー） ──
double-up:
  enabled: true                     # ダブルアップ機能の有効/無効
  min-amount: 100                   # ダブルアップ提示の最低配当額

# ── 戦闘エリア外脱出ペナルティ ──
out-of-bounds:
  grace-seconds: 10                 # エリア外に出てから失格までの猶予秒数

# ── ストレージ設定 ──
# redis (デフォルト) / yaml
# ChipLib の RedisConnectionManager を共有して地形復元データを Redis に保存する。
# Redis 接続失敗時は自動的にインメモリにフォールバックする。
storage:
  type: redis
  redis:
    host: localhost
    port: 6379
    password: ""
    database: 0
    pool:
      max-total: 8
      max-idle: 4
    prefix: "colosseum"
