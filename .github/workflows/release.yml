name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x gradlew
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew build -Pversion=${VERSION}

      - name: Prepare JAR
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp build/libs/CasinoCore-${VERSION}.jar ./CasinoCore-${VERSION}.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CasinoCore ${{ github.ref_name }}"
          generate_release_notes: true
          files: CasinoCore-*.jar
