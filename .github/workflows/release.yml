name: Build & Release

on:
  push:
    tags:
      - 'v*-casino'
      - 'v*-arena'
      - 'v*-chiplib'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          # タグ形式: v{YY.M.D}-{module} または v{YY.M.D.N}-{module}
          # 例: v26.6.14-arena → VERSION=26.6.14, MODULE=arena
          # 例: v26.6.14.1-casino → VERSION=26.6.14.1, MODULE=casino
          VERSION="${TAG#v}"          # 26.6.14-arena
          MODULE="${VERSION##*-}"     # arena
          VERSION="${VERSION%-*}"     # 26.6.14

          # バージョン形式バリデーション (YY.M.D or YY.M.D.N)
          if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "::error::Invalid version format: ${VERSION} (expected YY.M.D or YY.M.D.N)"
            exit 1
          fi

          case "${MODULE}" in
            casino)
              PROJECT="CasinoCore"
              GRADLE_MODULE=":CasinoCore"
              VERSION_PROP="casinoCoreVersion"
              ;;
            arena)
              PROJECT="ArenaCore"
              GRADLE_MODULE=":ArenaCore"
              VERSION_PROP="arenaCoreVersion"
              ;;
            chiplib)
              PROJECT="ChipLib"
              GRADLE_MODULE=":ChipLib"
              VERSION_PROP="chipLibVersion"
              ;;
            *)
              echo "::error::Unknown module: ${MODULE}"
              exit 1
              ;;
          esac

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "module=${MODULE}" >> "$GITHUB_OUTPUT"
          echo "project=${PROJECT}" >> "$GITHUB_OUTPUT"
          echo "gradle_module=${GRADLE_MODULE}" >> "$GITHUB_OUTPUT"
          echo "version_prop=${VERSION_PROP}" >> "$GITHUB_OUTPUT"

          echo "### Parsed Tag" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------| " >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | ${TAG} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Module | ${PROJECT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${VERSION} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Build & Test
        run: |
          chmod +x gradlew
          ./gradlew ${{ steps.tag.outputs.gradle_module }}:build \
            -P${{ steps.tag.outputs.version_prop }}=${{ steps.tag.outputs.version }}

      - name: Prepare release assets
        id: assets
        run: |
          PROJECT="${{ steps.tag.outputs.project }}"
          VERSION="${{ steps.tag.outputs.version }}"

          mkdir -p release-assets

          # shadow jar (fat jar) がある場合はそちらを優先
          FAT_JAR="${PROJECT}/build/libs/${PROJECT}-${VERSION}.jar"
          SLIM_JAR="${PROJECT}/build/libs/${PROJECT}-${VERSION}-slim.jar"

          if [ -f "${FAT_JAR}" ]; then
            cp "${FAT_JAR}" "release-assets/${PROJECT}-${VERSION}.jar"
          fi

          # slim jar も添付（存在する場合のみ）
          if [ -f "${SLIM_JAR}" ]; then
            cp "${SLIM_JAR}" "release-assets/${PROJECT}-${VERSION}-slim.jar"
          fi

          echo "### Release Assets" >> "$GITHUB_STEP_SUMMARY"
          ls -lh release-assets/ >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.tag.outputs.project }} ${{ steps.tag.outputs.version }}"
          generate_release_notes: true
          files: release-assets/*
