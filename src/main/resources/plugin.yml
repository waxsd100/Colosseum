name: CasinoCore
version: '${version}'
main: io.wax100.casinoCore.CasinoCore
api-version: '1.20'
depend: [ Vault ]
description: カジノプラグイン - チップ売買・換金・ランキング

commands:
  casino:
    description: カジノモードの管理コマンド
    usage: /casino <on|off|status|ranking>
    permission: casino.admin
  chip:
    description: チップの購入・情報コマンド
    usage: /chip <額面> <枚数> | /chip <金額> | /chip info | /chip balance | /chip cashout

permissions:
  casino.admin:
    description: カジノモードの管理権限
    default: op
